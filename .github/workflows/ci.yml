name: SkillSphere Continuous Integration

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-test:
    name: Backend Lint and Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt pytest pytest-django flake8 black

      - name: Lint Code
        run: |
          # Check syntax errors and format
          flake8 backend --count --select=E9,F63,F7,F82 --show-source --statistics
          black --check backend --line-length 120 --exclude .venv

      - name: Run Unit Tests
        env:
          DEBUG: "True"
          SECRET_KEY: "test-secret-key-for-ci-pipeline"
          DB_ENGINE: "django.db.backends.sqlite3"
        run: |
          cd backend
          python manage.py test

  frontend-test:
    name: Frontend Lint, Typecheck and Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: |
          cd frontend
          npm ci

      - name: Frontend Build
        run: |
          cd frontend
          npm run build

  docker-build-and-scan:
    name: Docker Images Build and Security Scan
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: skillsphere-backend:latest
          outputs: type=docker,dest=/tmp/backend-image.tar

      - name: Build Frontend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: skillsphere-frontend:latest
          outputs: type=docker,dest=/tmp/frontend-image.tar

      # Upload built image artifacts
      - name: Upload Backend Image Artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-docker-image
          path: /tmp/backend-image.tar

      - name: Upload Frontend Image Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-docker-image
          path: /tmp/frontend-image.tar
